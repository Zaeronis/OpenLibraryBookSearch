<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neonderthaw&family=Tilt+Neon&display=swap" rel="stylesheet">
    <title>Book Search</title>
  </head>
  <body>
    <div id="app" class="app">
      <div id="header" class="header">
        <div id="title" class="title">
          <span id="title-Book" class="title-Book">Book</span>
          <span id="title-Search" class="title-Search">Search</span>
        </div>
        <form id="search-bar" class="search-bar">
          <input
              type="text"
              placeholder="Search for a book title"
              id="search-input"
              class="search-input"
          >
          <button
              id="search-button"
              class="search-button"
          >
            Search
            </button>
        </form>
      </div>
      <div id="body" class="body">
        <p id="results-title" class="results-title">
          Results
        </p>
        <p id="loading" class="loading"></p>
        <ul id="results" class="results">
        </ul>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
